id: owasp_bopla
title: "API3: Broken Object Property Level Authorization"
inspired_by: https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/
description: >
  Test whether the API enforces authorization at the property level within objects.
  Attackers send extra or restricted properties in request bodies (mass assignment)
  or read properties they should not see (excessive data exposure). The API should
  allow users to read and write only the specific properties they are authorized
  for, filtering both input and output.
blockers:
  - Sending extra properties (e.g. role, is_admin, owner_id) in a create or update request does not change restricted fields
  - API responses do not expose sensitive internal properties (e.g. password hashes, internal IDs, other users' PII) beyond what the caller is authorized to see
  - A non-privileged user cannot elevate their own permissions by writing to authorization-related fields
