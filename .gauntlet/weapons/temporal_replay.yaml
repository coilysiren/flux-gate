id: temporal_replay
title: Completed or expired actions cannot be replayed or reordered
inspired_by: https://en.wikipedia.org/wiki/Replay_attack
description: >
  The API must be resilient to replay and timing attacks. Replaying an
  identical request that already succeeded (e.g. re-submitting a creation
  or a state change) must not produce duplicate side effects or succeed
  a second time when the first already consumed the opportunity. Similarly,
  requests that arrive out of the expected order should not corrupt state.
blockers:
  - Replaying a successful creation request does not produce a duplicate resource
  - Replaying a state-change request that already completed is rejected or is idempotent without side effects
  - Out-of-order requests do not leave the resource in an inconsistent state
  - Response bodies for replayed requests clearly indicate the action was not re-applied
